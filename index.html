<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RideThis?</title>
  <link rel="stylesheet" href="./styles.css?v=20260219y" />
</head>
<body>
  <div class="bg"></div>
  <nav class="global-nav">
    <div class="lang-switch">
      <button id="langKoBtn" class="lang-btn" type="button">KO</button>
      <button id="langEnBtn" class="lang-btn active" type="button">EN</button>
    </div>
  </nav>
  <main class="app">
    <header class="topbar">
      <div class="topbar-row">
        <h1 id="titleMain">RideThis?</h1>
      </div>
      <p id="titleSub">We will recommend the attractions that fit you best right now.</p>
    </header>

    <section id="onboarding" class="panel">
      <h2 id="surveyTitle">Recommendation Survey</h2>
      <p class="step-indicator"><span id="stepNow">1</span>/2</p>
      <form id="profileForm" class="wizard">
        <div id="step1" class="wizard-step">
          <div class="question-card">
            <div class="question-head">
              <span class="q-number">1</span>
              <h3 id="step1Title">What are your (or your child's) age and height?</h3>
            </div>
            <div class="grid two-col">
              <label><span id="labelAge">Age</span>
                <input type="number" name="age" value="20" min="0" max="120" required />
              </label>
              <label><span id="labelHeight">Height (cm)</span>
                <input type="number" name="height_cm" value="120" min="50" max="250" required />
              </label>
            </div>
          </div>
          <div class="wizard-actions">
            <button id="toStep2Btn" class="primary" type="button">Next</button>
          </div>
        </div>

        <div id="step2" class="wizard-step hidden">
          <div class="question-card">
            <div class="question-head">
              <span class="q-number">2</span>
              <h3 id="step2Title">Choose your tags</h3>
            </div>
            <fieldset class="tags-field">
              <legend id="legendSelected">Preferred Tags</legend>
              <div id="selectedTags" class="pill-grid"></div>
            </fieldset>
            <fieldset class="tags-field">
              <legend id="legendMust">Must-Ride Tags</legend>
              <div id="mustRideTags" class="pill-grid"></div>
            </fieldset>
            <fieldset class="tags-field">
              <legend id="legendAvoid">Avoid Tags</legend>
              <div id="avoidTags" class="pill-grid"></div>
            </fieldset>
          </div>
          <div class="wizard-actions">
            <button id="backToStep1Btn" class="secondary" type="button">Back</button>
            <button id="startRecoBtn" class="primary" type="submit">Start Recommendation</button>
          </div>
        </div>
      </form>
      <p id="errorText" class="error-text hidden"></p>
    </section>

    <section id="results" class="panel hidden">
      <div class="results-meta">
        <h2 id="resultsTitle">Explore Picks & Shows</h2>
      </div>
      <div class="refresh-status">
        <button id="refreshBtn" class="secondary icon-btn" type="button" aria-label="Refresh" title="Refresh"></button>
        <p id="refreshMeta" class="refresh-meta"></p>
      </div>

      <div class="tabs">
        <button id="tabRecoBtn" class="tab-btn active" type="button">Recommended</button>
        <button id="tabAllAttrBtn" class="tab-btn" type="button">All Attractions</button>
        <button id="tabStageBtn" class="tab-btn" type="button">Stage Shows</button>
        <button id="tabParadeBtn" class="tab-btn" type="button">Parade</button>
        <button id="tabNightBtn" class="tab-btn" type="button">Night</button>
      </div>

      <section id="tabRecoPanel">
        <div class="reco-reset-wrap">
          <button id="resetBtn" class="secondary icon-btn reset-inline" type="button" aria-label="Reset" title="Reset"></button>
        </div>
        <div id="specialWrap"></div>
        <div id="cards" class="cards"></div>
        <h3 id="blacklistTitle">Do Not Recommend Again</h3>
        <div id="blacklist" class="cards cards-sm"></div>
      </section>

      <section id="tabAllAttrPanel" class="tab-panel hidden">
        <div class="filter-bar">
          <label>
            <span id="allFilterNameLabel">Name</span>
            <input id="allSearchName" type="text" placeholder="Search by name" />
          </label>
          <label>
            <span id="allFilterDistanceLabel">Max Distance</span>
            <select id="allFilterDistance">
              <option value="">All</option>
              <option value="500">500m</option>
              <option value="1000">1km</option>
              <option value="2000">2km</option>
            </select>
          </label>
          <label>
            <span id="allFilterWaitLabel">Max Wait</span>
            <select id="allFilterWait">
              <option value="">All</option>
              <option value="20">20 min</option>
              <option value="40">40 min</option>
              <option value="60">60 min</option>
            </select>
          </label>
          <label>
            <span id="allFilterOperationLabel">Operation</span>
            <select id="allFilterOperation">
              <option value="">All</option>
              <option value="operating">Operating</option>
              <option value="not_operating">Not Operating</option>
            </select>
          </label>
          <label>
            <span id="allFilterTagLabel">Tag</span>
            <details id="allTagDetails" class="tag-details">
              <summary id="allTagSummary">Tags (0)</summary>
              <input id="allTagSearch" type="text" placeholder="Search tags" />
              <div id="allFilterTags" class="pill-grid"></div>
            </details>
          </label>
          <label>
            <span id="allSortLabel">Sort</span>
            <select id="allSort">
              <option value="distance">Distance</option>
              <option value="wait">Wait</option>
              <option value="name">Name</option>
              <option value="popularity">Popularity</option>
            </select>
          </label>
        </div>
        <div id="allAttrCards" class="cards"></div>
      </section>

      <section id="tabStagePanel" class="tab-panel hidden">
        <div id="stageCards" class="cards"></div>
        <section id="closedPanel" class="tab-panel">
          <h3 id="closedTitle">Closed Facilities</h3>
          <div id="closedCards" class="cards cards-sm"></div>
        </section>
      </section>

      <section id="tabParadePanel" class="tab-panel hidden">
        <div id="paradeCard" class="cards cards-sm"></div>
      </section>

      <section id="tabNightPanel" class="tab-panel hidden">
        <div id="nightCard" class="cards cards-sm"></div>
      </section>

    </section>
  </main>

  <button id="nextBtn" class="next-btn hidden">Next Picks</button>

  <div id="loading" class="loading hidden">
    <div id="loadingText">Thinking...</div>
  </div>

  <template id="cardTpl">
    <article class="card">
      <div class="card-head">
        <h4 class="name"></h4>
        <span class="wait"></span>
      </div>
      <p class="status"></p>
      <p class="distance"></p>
      <p class="tags"></p>
      <div class="actions">
        <button class="danger ban">Do Not Recommend</button>
      </div>
    </article>
  </template>

  <dialog id="detailDialog" class="detail-dialog">
    <button id="detailCloseBtn" class="detail-close" type="button">×</button>
    <div id="detailBody"></div>
  </dialog>

  <script src="./app.js?v=20260219x" type="module"></script>
</body>
</html>
